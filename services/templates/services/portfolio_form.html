{% extends 'services/base.html' %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">{{ title }}</h4>
                </div>
                <div class="card-body">
                    <form method="post" enctype="multipart/form-data">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">Название работы</label>
                            {{ form.title }}
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">Описание</label>
                            {{ form.description }}
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">Фото работы</label>
                            {{ form.image }}
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">Цена работы</label>
                            {{ form.price }}
                        </div>
                        
                        <div class="d-flex justify-content-between mt-4">
                            <a href="{% url 'users:user_profile' %}" class="btn btn-outline-secondary">
                                <i class="fas fa-arrow-left me-1"></i>Назад
                            </a>
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save me-1"></i>Сохранить
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
