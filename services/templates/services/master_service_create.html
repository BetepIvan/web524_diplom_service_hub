{% extends 'services/base.html' %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">Добавить услугу</h4>
                </div>
                <div class="card-body">
                    {% if form.non_field_errors %}
                    <div class="alert alert-warning">
                        {{ form.non_field_errors }}
                    </div>
                    {% endif %}
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label">Цена (₽)</label>
                            {{ form.price }}
                            <small class="text-muted d-block">Оставьте пустым - цена по договоренности</small>
                        </div>
                        <div class="alert alert-info">
                            <i class="fas fa-info-circle me-1"></i> Услуга будет добавлена в ваш профиль
                        </div>
                        <div class="d-flex justify-content-between">
                            <a href="{% url 'services:service_library' %}" class="btn btn-outline-secondary">Назад</a>
                            <button type="submit" class="btn btn-primary">Добавить</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
